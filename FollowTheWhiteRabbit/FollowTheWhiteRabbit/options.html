<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Follow the White Rabbit</title>
  <link rel="stylesheet" href="options.css">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Quill.js CSS -->
  <link href="quill.snow.css" rel="stylesheet">
  <!-- Google Fonts for rich text -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Open+Sans:wght@300;400;600;700&family=Lato:wght@300;400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container py-3">
    <h1 class="mb-3">Follow the White Rabbit</h1>
    <div class="card mb-3" id="profileBar">
      <div class="card-body d-flex align-items-center gap-2 py-2 flex-wrap">
        <label class="fw-bold mb-0">Profile:</label>
        <select id="profileSelect" class="form-select form-select-sm" style="max-width: 250px;"></select>
        <button id="btnAddProfile" class="btn btn-sm btn-outline-primary" title="New Profile"><i class="bi bi-plus-lg"></i></button>
        <button id="btnEditProfile" class="btn btn-sm btn-outline-secondary" title="Rename Profile"><i class="bi bi-pencil"></i></button>
        <button id="btnDuplicateProfile" class="btn btn-sm btn-outline-secondary" title="Duplicate Profile"><i class="bi bi-copy"></i></button>
        <button id="btnDeleteProfile" class="btn btn-sm btn-outline-danger" title="Delete Profile"><i class="bi bi-trash"></i></button>
      </div>
    </div>
    <div class="btn-group mb-3">
      <button id="btnAdd" class="btn btn-primary">Add New Item</button>
      <button id="btnExport" class="btn btn-secondary">Export Items</button>
      <input type="file" id="fileInput" style="display: none;" accept=".json">
      <button id="btnImport" class="btn btn-secondary">Import Items</button>
    </div>
    <div class="form-check mb-2">
      <input class="form-check-input" type="checkbox" value="" id="showAllLinks">
      <label class="form-check-label" for="showAllLinks">
        Show all links
      </label>
    </div>
    <div class="table-responsive" style="max-height: 350px; overflow-y: auto;">
      <table id="itemsTable" class="table table-striped table-hover align-middle mb-0">
        <thead class="table-light sticky-top">
          <tr>
            <th scope="col"></th>
            <th scope="col">Call Name</th>
            <th scope="col">Profiles</th>
            <th scope="col">Actions</th>
          </tr>
        </thead>
        <tbody id="itemsBody">
          <!-- List items will be inserted here -->
        </tbody>
      </table>
    </div>

    <div class="card mb-3 mt-3">
      <div class="card-header">Menu Appearance</div>
      <div class="card-body">
        <div class="row align-items-end">
          <div class="col-md-4">
            <label for="hoverBgColor">Hover Background:</label>
            <div class="input-group">
              <input type="color" id="hoverBgColor" class="form-control form-control-color" value="#0365D8">
              <input type="text" id="hoverBgHex" class="form-control" value="#0365D8" maxlength="7">
            </div>
          </div>
          <div class="col-md-4">
            <label for="hoverTextColor">Hover Text Color:</label>
            <div class="input-group">
              <input type="color" id="hoverTextColor" class="form-control form-control-color" value="#FFFFFF">
              <input type="text" id="hoverTextHex" class="form-control" value="#FFFFFF" maxlength="7">
            </div>
          </div>
          <div class="col-md-4">
            <button id="btnResetColors" class="btn btn-outline-secondary">Reset to Default</button>
          </div>
        </div>
      </div>
    </div>

    <div class="text-center mt-3 mb-1">
      <a href="https://www.linkedin.com/in/maniecronje/" target="_blank" rel="noopener noreferrer" class="text-muted" style="font-size: 10px; text-decoration: none; opacity: 0.6;">macroz</a>
    </div>
  </div>

  <!-- Modal Dialog for Add/Edit -->
  <div id="modalDialog" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 id="modalTitle">Add New Item</h2>
      <form id="itemForm">
        <label for="pkURL">Primary Key URL:</label>
        <input type="text" id="pkURL" name="pkURL" required>
        
        <label for="callName">Call Name:</label>
        <input type="text" id="callName" name="callName" maxlength="500" required>
        
        <label for="url">URL:</label>
        <input type="url" id="url" name="url" required>
        
        <label for="currentTab">Open in Current Tab:</label>
        <input type="checkbox" id="currentTab" name="currentTab">
        
        <label for="actionType">Action Type:</label>
        <select id="actionType" name="actionType" required>
          <option value="openUrl">Open URL</option>
          <option value="alert">Show Alert</option>
          <option value="logToConsole">Log to Console</option>
          <option value="injectBanner">Inject Banner/Message</option>
          <option value="customHtmlModal">Display Custom HTML Modal</option>
          <option value="richTextModal">Rich Text Modal</option>
          <option value="functionCall">Function Call</option>
          <option value="countdownClock">Countdown Clock</option>
          <option value="todoList">To Do List</option>
          <option value="note">Note</option>
        </select>
        <div id="actionParamsContainer"></div>
        <div id="profileCheckboxesContainer" class="mb-3">
          <label class="fw-bold">Assign to Profiles:</label>
          <div id="profileCheckboxes" class="d-flex flex-wrap gap-2 mt-1"></div>
        </div>
        <input type="hidden" id="editIndex">
        <button type="submit">Save</button>
      </form>
    </div>
  </div>

  <script src="Sortable.min.js"></script>
  <!-- Quill.js JavaScript -->
  <script src="quill.min.js"></script>
  <script src="options.js"></script>
</body>
</html>
